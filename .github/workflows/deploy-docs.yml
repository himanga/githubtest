name: Build & Deploy Docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-naturaldocs:
    name: Generate API docs (NaturalDocs)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Perl
        run: sudo apt-get install -y perl

      - name: Download and unpack NaturalDocs
        run: |
          curl -L -o NaturalDocs.zip \
            https://www.naturaldocs.org/download/natural_docs/2.3/Natural_Docs_2.3.zip
          unzip -q NaturalDocs.zip -d nd_extracted
          mv "nd_extracted/Natural Docs" nd_bin

      - name: Prepare NaturalDocs working directory
        run: mkdir -p "naturaldocs/Working Data"

      - name: Run NaturalDocs
        run: |
          perl nd_bin/NaturalDocs \
            --project naturaldocs \
            --input   src \
            --output  HTML docs/naturaldocs

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    needs: build-naturaldocs
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        